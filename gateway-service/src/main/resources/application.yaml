server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: resource-service-route
              uri: lb://resource-service
              predicates:
                - Path=/resources/**
            - id: song-service-route
              uri: lb://song-service
              predicates:
                - Path=/songs/**

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true